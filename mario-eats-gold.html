<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Mario eats gold coins</title>
  <style>
    body {
      margin: 0;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      border: 2px solid #000;
      background: #87cefa;
      image-rendering: pixelated;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const CANVAS_WIDTH = canvas.width;
    const CANVAS_HEIGHT = canvas.height;
    const GROUND_HEIGHT = 40;

    const GRAVITY = 0.5;
    const MOVE_ACCEL = 0.5;
    const MAX_MOVE_SPEED = 5;
    const FRICTION = 0.85;
    const JUMP_SPEED = 9;

    const GOLD_RADIUS = 10;
    const OBSTACLE_SIZE = 20;
    const OBSTACLE_SPAWN_INTERVAL = 2000;

    let score = 0;
    let gameOver = false;

    const keys = {
      ArrowLeft: false,
      ArrowRight: false,
      Space: false,
    };

    const player = {
      width: 30,
      height: 30,
      x: 20,
      y: CANVAS_HEIGHT - GROUND_HEIGHT - 30,
      vx: 0,
      vy: 0,
      onGround: true,
      color: "red",
    };

    const marioImage = new Image();
    marioImage.src = "mario.png"; // 这里保持原来的路径
    let marioImageLoaded = false;
    marioImage.onload = () => {
      marioImageLoaded = true;
    };

    const gold = {
      x: 0,
      y: 0,
      radius: GOLD_RADIUS,
      vy: 2,
      active: false,
    };

    const obstacles = [];
    let lastObstacleSpawnTime = performance.now();

    // 云朵数组：每个云朵 { x, y, width, height, speed }
    const clouds = [];
    const CLOUD_LAYER_Y_MIN = 40;
    const CLOUD_LAYER_Y_MAX = 160;

    function createCloud() {
      const width = 60 + Math.random() * 40;
      const height = 25 + Math.random() * 10;
      const y =
        CLOUD_LAYER_Y_MIN +
        Math.random() * (CLOUD_LAYER_Y_MAX - CLOUD_LAYER_Y_MIN);
      const speed = 0.3 + Math.random() * 0.4;
      const x = Math.random() < 0.5 ? Math.random() * CANVAS_WIDTH : -width;
      clouds.push({ x, y, width, height, speed });
    }

    function initClouds() {
      clouds.length = 0;
      for (let i = 0; i < 5; i++) {
        createCloud();
      }
    }

    function updateClouds() {
      for (const c of clouds) {
        c.x += c.speed;
      }
      for (let i = clouds.length - 1; i >= 0; i--) {
        const c = clouds[i];
        if (c.x - c.width > CANVAS_WIDTH + 50) {
          clouds.splice(i, 1);
        }
      }
      while (clouds.length < 5) {
        createCloud();
      }
    }

    function drawCloud(c) {
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      const r = c.height / 2;
      const baseX = c.x;
      const baseY = c.y;

      ctx.beginPath();
      ctx.arc(baseX + r, baseY + r, r, Math.PI * 0.5, Math.PI * 1.5);
      ctx.arc(baseX + r * 2, baseY, r, Math.PI, Math.PI * 2);
      ctx.arc(baseX + r * 3, baseY + r, r, Math.PI * 1.5, Math.PI * 0.5);
      ctx.closePath();
      ctx.fill();
    }

    function rectIntersect(ax, ay, aw, ah, bx, by, bw, bh) {
      return (
        ax < bx + bw &&
        ax + aw > bx &&
        ay < by + bh &&
        ay + ah > by
      );
    }

    function playerHitGold() {
      const goldSize = GOLD_RADIUS * 2;
      const gx = gold.x - GOLD_RADIUS;
      const gy = gold.y - GOLD_RADIUS;
      return rectIntersect(
        player.x,
        player.y,
        player.width,
        player.height,
        gx,
        gy,
        goldSize,
        goldSize
      );
    }

    function spawnGold() {
      gold.x =
        Math.random() * (CANVAS_WIDTH - GOLD_RADIUS * 2) + GOLD_RADIUS;
      gold.y = -GOLD_RADIUS * 2;
      gold.active = true;
    }

    function spawnObstacle() {
      const size = OBSTACLE_SIZE;
      const x = Math.random() * (CANVAS_WIDTH - size);
      const y = -size - Math.random() * 60;
      const vx =
        (Math.random() * 2 + 1.5) * (Math.random() < 0.5 ? 1 : -1);
      const vy = 1.2;
      obstacles.push({
        x,
        y,
        vx,
        vy,
        size,
        active: true,
      });
    }

    function resetGame() {
      score = 0;
      gameOver = false;

      player.x = 20;
      player.y = CANVAS_HEIGHT - GROUND_HEIGHT - player.height;
      player.vx = 0;
      player.vy = 0;
      player.onGround = true;

      gold.active = false;
      obstacles.length = 0;
      lastObstacleSpawnTime = performance.now();
      spawnGold();
      initClouds();
    }

    window.addEventListener("keydown", (e) => {
      if (
        e.code === "ArrowLeft" ||
        e.code === "ArrowRight" ||
        e.code === "Space"
      ) {
        e.preventDefault();
      }

      if (e.code === "ArrowLeft") keys.ArrowLeft = true;
      if (e.code === "ArrowRight") keys.ArrowRight = true;
      if (e.code === "Space") keys.Space = true;

      if (e.code === "KeyR") {
        resetGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") keys.ArrowLeft = false;
      if (e.code === "ArrowRight") keys.ArrowRight = false;
      if (e.code === "Space") keys.Space = false;
    });

    function update(deltaTime) {
      if (!gameOver) {
        updatePlayer();
        updateGold();
        updateObstacles();
        checkCollisions();
        maybeSpawnObstacle();
        updateClouds();
      } else {
        updateClouds();
      }
    }

    function updatePlayer() {
      if (keys.ArrowLeft) {
        player.vx -= MOVE_ACCEL;
      }
      if (keys.ArrowRight) {
        player.vx += MOVE_ACCEL;
      }

      if (player.vx > MAX_MOVE_SPEED) player.vx = MAX_MOVE_SPEED;
      if (player.vx < -MAX_MOVE_SPEED) player.vx = -MAX_MOVE_SPEED;

      if (!keys.ArrowLeft && !keys.ArrowRight) {
        player.vx *= FRICTION;
        if (Math.abs(player.vx) < 0.05) player.vx = 0;
      }

      if (keys.Space && player.onGround) {
        player.vy = -JUMP_SPEED;
        player.onGround = false;
      }

      player.vy += GRAVITY;

      player.x += player.vx;
      player.y += player.vy;

      const groundY = CANVAS_HEIGHT - GROUND_HEIGHT - player.height;
      if (player.y > groundY) {
        player.y = groundY;
        player.vy = 0;
        player.onGround = true;
      }

      if (player.x < 0) {
        player.x = 0;
        player.vx = 0;
      }
      if (player.x + player.width > CANVAS_WIDTH) {
        player.x = CANVAS_WIDTH - player.width;
        player.vx = 0;
      }
    }

    function updateGold() {
      if (!gold.active) return;
      gold.y += gold.vy;

      if (gold.y - GOLD_RADIUS > CANVAS_HEIGHT) {
        spawnGold();
      }
    }

    function updateObstacles() {
      for (let i = 0; i < obstacles.length; i++) {
        const o = obstacles[i];
        if (!o.active) continue;

        o.x += o.vx;
        o.y += o.vy;

        if (o.x < 0) {
          o.x = 0;
          o.vx *= -1;
        } else if (o.x + o.size > CANVAS_WIDTH) {
          o.x = CANVAS_WIDTH - o.size;
          o.vx *= -1;
        }

        if (o.y > CANVAS_HEIGHT) {
          o.active = false;
        }
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (!obstacles[i].active) obstacles.splice(i, 1);
      }
    }

    function maybeSpawnObstacle() {
      const now = performance.now();
      if (now - lastObstacleSpawnTime >= OBSTACLE_SPAWN_INTERVAL) {
        spawnObstacle();
        lastObstacleSpawnTime = now;
      }
    }

    function checkCollisions() {
      if (gold.active && playerHitGold()) {
        score += 10;
        gold.active = false;
        spawnGold();
      }

      for (const o of obstacles) {
        if (!o.active) continue;
        if (
          rectIntersect(
            player.x,
            player.y,
            player.width,
            player.height,
            o.x,
            o.y,
            o.size,
            o.size
          )
        ) {
          gameOver = true;
          break;
        }
      }
    }

    function drawBackground() {
      const skyGradient = ctx.createLinearGradient(
        0,
        0,
        0,
        CANVAS_HEIGHT
      );
      skyGradient.addColorStop(0, "#6ec6ff");
      skyGradient.addColorStop(0.5, "#87cefa");
      skyGradient.addColorStop(1, "#c0e9ff");
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      const sunX = CANVAS_WIDTH - 80;
      const sunY = 70;
      const sunR = 25;
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
      ctx.fillStyle = "#ffe066";
      ctx.fill();

      ctx.fillStyle = "#5aa02c";
      ctx.beginPath();
      ctx.moveTo(-100, CANVAS_HEIGHT - GROUND_HEIGHT);
      ctx.quadraticCurveTo(
        CANVAS_WIDTH * 0.3,
        CANVAS_HEIGHT - GROUND_HEIGHT - 70,
        CANVAS_WIDTH * 0.7,
        CANVAS_HEIGHT - GROUND_HEIGHT
      );
      ctx.quadraticCurveTo(
        CANVAS_WIDTH * 0.9,
        CANVAS_HEIGHT - GROUND_HEIGHT - 40,
        CANVAS_WIDTH + 100,
        CANVAS_HEIGHT - GROUND_HEIGHT
      );
      ctx.lineTo(CANVAS_WIDTH + 100, CANVAS_HEIGHT);
      ctx.lineTo(-100, CANVAS_HEIGHT);
      ctx.closePath();
      ctx.fill();

      for (const c of clouds) {
        drawCloud(c);
      }

      ctx.fillStyle = "#8b4513";
      ctx.fillRect(
        0,
        CANVAS_HEIGHT - GROUND_HEIGHT,
        CANVAS_WIDTH,
        GROUND_HEIGHT
      );

      const tileWidth = 20;
      const tileHeight = 8;
      ctx.fillStyle = "#a5662b";
      for (let x = 0; x < CANVAS_WIDTH + tileWidth; x += tileWidth) {
        ctx.fillRect(
          x,
          CANVAS_HEIGHT - tileHeight - 5,
          tileWidth - 3,
          tileHeight
        );
      }
    }

    function drawPlayer() {
      if (marioImageLoaded) {
        ctx.drawImage(
          marioImage,
          player.x,
          player.y,
          player.width,
          player.height
        );
      } else {
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    function drawGold() {
      if (!gold.active) return;
      ctx.fillStyle = "gold";
      ctx.beginPath();
      ctx.arc(gold.x, gold.y, gold.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#d4a017";
      ctx.stroke();
    }

    function drawObstacles() {
      ctx.fillStyle = "green";
      for (const o of obstacles) {
        if (!o.active) continue;
        ctx.fillRect(o.x, o.y, o.size, o.size);
      }
    }

    function drawScore() {
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText("Score: " + score, 10, 10);
    }

    function drawGameOver() {
      if (!gameOver) return;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.fillStyle = "white";
      ctx.font = "36px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "Game Over!",
        CANVAS_WIDTH / 2,
        CANVAS_HEIGHT / 2 - 20
      );

      ctx.font = "20px Arial";
      ctx.fillText(
        "Press R to restart",
        CANVAS_WIDTH / 2,
        CANVAS_HEIGHT / 2 + 20
      );
    }

    let lastTime = performance.now();

    function gameLoop(timestamp) {
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      update(deltaTime);

      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      drawBackground();
      drawGold();
      drawObstacles();
      drawPlayer();
      drawScore();
      drawGameOver();

      requestAnimationFrame(gameLoop);
    }

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
